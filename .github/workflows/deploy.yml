name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # จะรันทุกครั้งที่ Push ขึ้นสาขา main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ขั้นตอนนี้คือการเสกไฟล์ config.js ออกมาก่อน Deploy
    - name: Create config.js from secrets
      run: |
        echo "const CONFIG = {" > config.js
        echo "    API_KEY: '${{ secrets.API_KEY }}'," >> config.js
        echo "    SHEET_ID: '${{ secrets.SHEET_ID }}'," >> config.js
        echo "    RANGE: '${{ secrets.RANGE }}'" >> config.js
        echo "};" >> config.js

    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '.' # อัปโหลดทุกอย่างในโฟลเดอร์นี้ไปเป็นเว็บ (ตอนนี้มี config.js ที่เพิ่งสร้างแล้ว)

  deploy:
    needs: build_and_deploy
    permissions:
      pages: write      # จำเป็นต้องให้สิทธิ์เขียน GitHub Pages
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
