<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVE — EXCLUSIVE TABLE ACCESS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&family=Kanit:wght@200;300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Ambient background particles -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header>
        <div class="header-inner">
            <div class="header-eyebrow">EXCLUSIVE · PRIVATE · CURATED</div>
            <h1 class="header-title">RESERVE</h1>
            <div class="header-subtitle">TABLE AVAILABILITY</div>
            <div class="header-divider">
                <span class="divider-gem">◆</span>
            </div>
            <p class="last-updated-text">LAST UPDATED <span id="last-updated" class="gold-text">--:--</span></p>
        </div>
    </header>

    <main>
        <div id="filters">
            <select id="date-filter" class="filter-select">
                <option value="all">◆ ทุกวันที่</option>
            </select>
            <select id="day-filter" class="filter-select">
                <option value="all">◆ ทุกวัน</option>
            </select>
            <select id="store-filter" class="filter-select">
                <option value="all">◆ ทุกร้าน</option>
            </select>
            <select id="quantity-filter" class="filter-select">
                <option value="all">◆ ทุกจำนวนโต๊ะ</option>
            </select>
        </div>

        <div id="loader" class="loader">
            <div class="loader-inner">
                <div class="loader-ring"></div>
                <span>CURATING YOUR EXPERIENCE</span>
            </div>
        </div>

        <div id="tables-container">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </main>

    <!-- Modal for layout image -->
    <div id="image-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-wrapper">
            <span class="close-btn">&#10005;</span>
            <div class="carousel-container">
                <div class="carousel-track" id="carousel-track">
                    <!-- Images will be injected here -->
                </div>
                <button class="carousel-btn prev-btn" id="carousel-prev" style="display: none;">&#10094;</button>
                <button class="carousel-btn next-btn" id="carousel-next" style="display: none;">&#10095;</button>
                <div class="carousel-indicators" id="carousel-indicators"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
